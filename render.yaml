services:
  # Backend service
  - type: web
    name: pgmaster-backend
    env: python
    buildCommand: pip install -r pgmaster-backend/requirements.txt
    startCommand: cd pgmaster-backend && python manage.py collectstatic --noinput && python manage.py migrate && gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: pgmaster-db
          property: connectionString

# Database service
databases:
  - name: pgmaster-db
    plan: free
